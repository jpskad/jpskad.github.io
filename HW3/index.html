<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Search</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="welcome-card">
        <h1 class="welcome-title">Weather Search</h1>
        <p class="welcome-text">Enter a city to search the current weather data.</p>
        
        <form id="weatherForm" style="width: 100%;">
            <div style="margin-bottom: 20px; text-align: left;">
                <label class="form-label">Location</label>
                <input type="text" id="cityInput" class="form-control" placeholder="e.g. Los Angeles, Tokyo..." style="width: 100%; box-sizing: border-box;">
                <div id="zipError" class="feedback-slot"></div>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Get Forecast</button>
        </form>

        <div id="weatherInfo" class="quiz-shell" style="display: none;">
            <h2 id="cityName" class="quiz-title">City Name</h2>
            <img id="tempImage" src="" alt="Weather Condition" class="weather-img">
            <div id="tempDisplay"></div>
            <p id="weatherDesc" class="welcome-text"></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
